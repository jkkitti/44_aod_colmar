<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Colmar Academy</title>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <!--=== header ===-->
    <header class="bg-white">
      <div class="flex items-center px-6 h-16">
        <!-- logo -->
        <div class="flex items-center gap-0">
          <img src="/ic-logo.svg" class="w-8 h-8" />
          <span class="font-bold">
            COLMAR <span class="text-gray-400">ACADEMY</span>
          </span>
        </div>

        <!-- menu -->
        <nav class="hidden md:flex gap-6 ml-auto">
          <a href="#">On campus</a>
          <a href="#">Online</a>
          <a href="#">For companies</a>
          <a href="#">Sign in</a>
        </nav>

        <!-- mobile menu -->
        <nav class="md:hidden w-full">
          <ul class="flex justify-center items-center gap-16">
            <li><img src="/ic-logo.svg" class="h-10" /></li>
            <li><img src="/ic-on-campus.svg" class="h-10" /></li>
            <li><img src="/ic-online.svg" class="h-10" /></li>
            <li><img src="/ic-login.svg" class="h-10" /></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <!-- === hero section === -->
      <section class="flex flex-col md:flex-row bg-gray-300 px-6 md:py-8">
        <!-- left-->
        <div class="md:basis-3/5">
          <img src="/banner.jpg" class="w-full" />
        </div>

        <!-- right -->
        <div
          class="md:basis-2/5 flex flex-col justify-center px-4 py-8 md:px-0 md:py-0 md:pl-8"
        >
          <h1 class="text-3xl md:text-5xl font-bold leading-tight mb-8">
            Learn something<br class="hidden md:block" />
            new everyday
          </h1>

          <p class="text-gray-600 font-bold mb-6">
            Lorem, ipsum. Dolor sit amet consectetur adipisicing elit. Voluptas,
            voluptate
          </p>

          <a href="#" class="bg-gray-700 text-white text-center py-2">
            Start here
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
